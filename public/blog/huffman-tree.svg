<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="820" height="380" fill="#f7f8fa"/>
  <text x="32" y="44" font-size="20" font-weight="700" fill="#1f2937">Huffman coding: short codes for frequent symbols</text>
  <text x="32" y="70" font-size="14" fill="#6b7280">Every symbol is a leaf, so no code is a prefix of another — the bit stream decodes with no separators.</text>

  <!-- edges -->
  <g stroke="#9ca3af" stroke-width="2">
    <line x1="300" y1="120" x2="210" y2="180"/>
    <line x1="300" y1="120" x2="390" y2="180"/>
    <line x1="390" y1="180" x2="320" y2="250"/>
    <line x1="390" y1="180" x2="470" y2="250"/>
    <line x1="470" y1="250" x2="410" y2="315"/>
    <line x1="470" y1="250" x2="540" y2="315"/>
  </g>
  <!-- edge labels -->
  <g font-size="13" font-weight="700" fill="#2563eb">
    <text x="240" y="155">0</text>
    <text x="352" y="155">1</text>
    <text x="345" y="222">0</text>
    <text x="440" y="222">1</text>
    <text x="428" y="288">0</text>
    <text x="520" y="288">1</text>
  </g>

  <!-- internal nodes -->
  <g>
    <circle cx="300" cy="120" r="22" fill="#1f2937"/>
    <text x="300" y="125" font-size="12" fill="#fff" text-anchor="middle">11</text>
    <circle cx="390" cy="180" r="20" fill="#374151"/>
    <text x="390" y="185" font-size="11" fill="#fff" text-anchor="middle">6</text>
    <circle cx="470" cy="250" r="18" fill="#4b5563"/>
    <text x="470" y="255" font-size="11" fill="#fff" text-anchor="middle">3</text>
  </g>

  <!-- leaves -->
  <g>
    <rect x="182" y="160" width="56" height="40" rx="8" fill="#2563eb"/>
    <text x="210" y="178" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">e</text>
    <text x="210" y="193" font-size="10" fill="#dbeafe" text-anchor="middle">freq 5</text>

    <rect x="292" y="230" width="56" height="40" rx="8" fill="#3b82f6"/>
    <text x="320" y="248" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">a</text>
    <text x="320" y="263" font-size="10" fill="#dbeafe" text-anchor="middle">freq 3</text>

    <rect x="382" y="295" width="56" height="40" rx="8" fill="#60a5fa"/>
    <text x="410" y="313" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">r</text>
    <text x="410" y="328" font-size="10" fill="#1e3a8a" text-anchor="middle">freq 2</text>

    <rect x="512" y="295" width="56" height="40" rx="8" fill="#93c5fd"/>
    <text x="540" y="313" font-size="14" font-weight="700" fill="#1e3a8a" text-anchor="middle">t</text>
    <text x="540" y="328" font-size="10" fill="#1e3a8a" text-anchor="middle">freq 1</text>
  </g>

  <!-- code table -->
  <g font-size="14">
    <text x="620" y="150" font-size="13" font-weight="700" fill="#1f2937">Code table</text>
    <text x="620" y="178" fill="#374151" font-family="ui-monospace, monospace">e &#8594; 0</text>
    <text x="620" y="202" fill="#374151" font-family="ui-monospace, monospace">a &#8594; 10</text>
    <text x="620" y="226" fill="#374151" font-family="ui-monospace, monospace">r &#8594; 110</text>
    <text x="620" y="250" fill="#374151" font-family="ui-monospace, monospace">t &#8594; 111</text>
    <text x="620" y="286" font-size="11" fill="#6b7280">path from root,</text>
    <text x="620" y="302" font-size="11" fill="#6b7280">left = 0, right = 1</text>
  </g>
</svg>

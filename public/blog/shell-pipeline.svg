<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="820" height="340" fill="#f7f8fa"/>
  <text x="32" y="44" font-size="20" font-weight="700" fill="#1f2937">A pipeline is processes wired by kernel pipes</text>
  <text x="32" y="70" font-size="14" fill="#6b7280">cat file | grep err | wc -l — three children run at once, data streams through the kernel.</text>

  <defs>
    <marker id="sa" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- stage boxes -->
  <g>
    <rect x="40" y="150" width="170" height="60" rx="12" fill="#2563eb"/>
    <text x="125" y="180" font-size="16" font-weight="700" fill="#fff" text-anchor="middle" font-family="ui-monospace, monospace">cat file</text>
    <text x="125" y="200" font-size="11" fill="#dbeafe" text-anchor="middle">stage 0</text>

    <rect x="325" y="150" width="170" height="60" rx="12" fill="#7c3aed"/>
    <text x="410" y="180" font-size="16" font-weight="700" fill="#fff" text-anchor="middle" font-family="ui-monospace, monospace">grep err</text>
    <text x="410" y="200" font-size="11" fill="#ede9fe" text-anchor="middle">stage 1</text>

    <rect x="610" y="150" width="170" height="60" rx="12" fill="#0ea5e9"/>
    <text x="695" y="180" font-size="16" font-weight="700" fill="#fff" text-anchor="middle" font-family="ui-monospace, monospace">wc -l</text>
    <text x="695" y="200" font-size="11" fill="#e0f2fe" text-anchor="middle">stage 2</text>
  </g>

  <!-- pipes -->
  <g font-family="ui-monospace, monospace" font-size="12" fill="#6b7280" text-anchor="middle">
    <line x1="210" y1="180" x2="323" y2="180" stroke="#9ca3af" stroke-width="2.5" marker-end="url(#sa)"/>
    <text x="266" y="142">pipe0</text>
    <text x="266" y="232" font-size="11">w0 → r0</text>
    <line x1="495" y1="180" x2="608" y2="180" stroke="#9ca3af" stroke-width="2.5" marker-end="url(#sa)"/>
    <text x="551" y="142">pipe1</text>
    <text x="551" y="232" font-size="11">w1 → r1</text>
  </g>

  <!-- stdin / stdout ends -->
  <g font-family="ui-monospace, monospace" font-size="12" fill="#9ca3af">
    <text x="40" y="142">stdin</text>
    <text x="740" y="142">stdout</text>
  </g>

  <!-- warning -->
  <rect x="40" y="262" width="740" height="48" rx="10" fill="#fef3c7"/>
  <text x="58" y="282" font-size="13" font-weight="700" fill="#92400e">The deadlock:</text>
  <text x="58" y="300" font-size="13" fill="#92400e" font-family="ui-monospace, monospace">if the parent keeps its copy of w0 open, r0 never sees EOF — wc waits forever.</text>
</svg>

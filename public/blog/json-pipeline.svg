<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="820" height="320" fill="#f7f8fa"/>
  <text x="32" y="44" font-size="20" font-weight="700" fill="#1f2937">A JSON parser is a two-stage pipeline</text>
  <text x="32" y="70" font-size="14" fill="#6b7280">The lexer checks what's locally valid; the parser checks the arrangement and builds the tree.</text>

  <!-- stage boxes -->
  <g>
    <rect x="40" y="120" width="150" height="70" rx="10" fill="#fff" stroke="#d1d5db"/>
    <text x="115" y="150" font-size="13" font-weight="700" fill="#1f2937" text-anchor="middle">Raw text</text>
    <text x="115" y="172" font-size="12" fill="#6b7280" text-anchor="middle" font-family="ui-monospace, monospace">{"x":[1,true]}</text>

    <rect x="250" y="120" width="150" height="70" rx="10" fill="#2563eb"/>
    <text x="325" y="150" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Lexer</text>
    <text x="325" y="172" font-size="11" fill="#dbeafe" text-anchor="middle">char by char</text>

    <rect x="460" y="120" width="150" height="70" rx="10" fill="#fff" stroke="#d1d5db"/>
    <text x="535" y="148" font-size="13" font-weight="700" fill="#1f2937" text-anchor="middle">Tokens</text>
    <text x="535" y="170" font-size="11" fill="#6b7280" text-anchor="middle" font-family="ui-monospace, monospace">{ STRING : [ ... ]</text>

    <rect x="670" y="120" width="150" height="70" rx="10" fill="#2563eb"/>
    <text x="745" y="150" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Parser</text>
    <text x="745" y="172" font-size="11" fill="#dbeafe" text-anchor="middle">LL(1) descent</text>
  </g>

  <!-- arrows -->
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <g stroke="#9ca3af" stroke-width="2" marker-end="url(#ah)">
    <line x1="192" y1="155" x2="246" y2="155"/>
    <line x1="402" y1="155" x2="456" y2="155"/>
    <line x1="612" y1="155" x2="666" y2="155"/>
  </g>

  <!-- output -->
  <text x="420" y="250" font-size="13" font-weight="700" fill="#1f2937" text-anchor="middle">Python value</text>
  <text x="420" y="274" font-size="13" fill="#374151" text-anchor="middle" font-family="ui-monospace, monospace">{'x': [1, True]}</text>
  <line x1="745" y1="192" x2="745" y2="235" stroke="#9ca3af" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="745" y1="240" x2="540" y2="262" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4 4"/>
</svg>
